<!DOCTYPE html>
<html lang="fr">
<head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="app">
    <div class="top">
      <span class="logo">⏱ AutoMontage</span>
      <span id="file" class="file">Dépose un audio…</span>
      <div class="right">
        <label class="sellbl">Sous-titres</label>
        <select id="style" class="sel"></select>
        <label class="boost"><input type="checkbox" id="boost"> ✨ Boost Hook</label>
        <button id="setBtn" class="btn">⚙ Réglages</button>
        <button id="genBtn" class="btn green" disabled>🎬 Générer l'aperçu</button>
        <button id="expBtn" class="btn primary" disabled>⬇ Exporter</button>
        <button id="igBtn" class="btn" disabled>📷 Publier Instagram</button>
      </div>
    </div>

    <div class="mid">
      <div id="drop" class="center">
        <div class="dropzone">📥 Glisse ton fichier audio ici</div>
        <video id="preview" controls style="display:none"></video>
        <div id="status" class="status"></div>
      </div>
      <div class="panel right">
        <div class="tabs">
          <button id="tabTr" class="tab active">Transcription</button>
          <button id="tabDesc" class="tab">Description</button>
        </div>
        <div id="paneTr" class="pane">
          <textarea id="transcript" placeholder="La transcription apparaîtra ici…"></textarea>
        </div>
        <div id="paneDesc" class="pane" style="display:none">
          <textarea id="caption" placeholder="La description apparaîtra ici…"></textarea>
          <div class="descbtns">
            <button id="regenBtn" class="tool">↻ Régénérer</button>
            <button id="copyBtn" class="tool">📋 Copier</button>
          </div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="wavebar">
        <span class="ttl" style="margin:0">Audio</span>
        <button id="playBtn" class="tool" disabled>▶ Lire</button>
        <span id="time" class="time">00:00 / 00:00</span>
        <span class="legend">
          <span><i class="dot y"></i>Reprise</span>
          <span><i class="dot r"></i>À vérifier</span>
        </span>
        <span class="sep"></span>
        <button id="selPlay" class="tool" disabled>🔊 Écouter sélection</button>
        <button id="selDel" class="tool rm" disabled>✂ Supprimer sélection</button>
        <button id="selClear" class="tool" disabled>✖</button>
        <span class="wavehint">Glisse pour sélectionner · clic sur zone colorée → Garder/Supprimer · clic = déplacer lecture</span>
      </div>
      <div class="wavewrap"><canvas id="wave"></canvas></div>
    </div>
  </div>

  <div id="menu" class="menu" style="display:none"></div>
  <audio id="player"></audio>

  <div id="setModal" class="modal" style="display:none">
    <div class="modalbox">
      <h3>Réglages Instagram</h3>
      <label>Token longue durée</label>
      <input id="setToken" type="password" placeholder="EAAB...">
      <label>IG Business Account ID</label>
      <input id="setIgId" type="text" placeholder="178414...">
      <div class="modalbtns">
        <button id="setSave" class="btn primary">Enregistrer</button>
        <button id="setClose" class="btn">Fermer</button>
      </div>
      <p id="setMsg" class="status"></p>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
