<!DOCTYPE html>
<html lang="fr">
<head><meta charset="utf-8"><link rel="stylesheet" href="styles.css"></head>
<body>
  <div class="app">
    <div class="top">
      <span class="logo">⏱ AutoMontage</span>
      <span id="file" class="file">Dépose un audio…</span>
      <div class="right">
        <button id="genBtn" class="btn green" disabled>🎬 Générer l'aperçu</button>
        <button id="expBtn" class="btn primary" disabled>⬇ Exporter</button>
      </div>
    </div>

    <div class="mid">
      <div id="drop" class="center">
        <div class="dropzone">📥 Glisse ton fichier audio ici</div>
        <video id="preview" controls style="display:none"></video>
        <div id="status" class="status"></div>
      </div>
      <div class="panel right">
        <div class="ttl">Transcription (corrigeable)</div>
        <textarea id="transcript" placeholder="La transcription apparaîtra ici…"></textarea>
      </div>
    </div>

    <div class="bottom">
      <div class="wavebar">
        <span class="ttl" style="margin:0">Audio</span>
        <button id="playBtn" class="tool" disabled>▶ Lire</button>
        <span id="time" class="time">00:00 / 00:00</span>
        <span class="legend">
          <span><i class="dot y"></i>Reprise</span>
          <span><i class="dot r"></i>À vérifier</span>
        </span>
        <span class="wavehint">Clic sur une zone colorée → Garder / Supprimer · clic ailleurs → déplacer la lecture</span>
      </div>
      <div class="wavewrap"><canvas id="wave"></canvas></div>
    </div>
  </div>

  <div id="menu" class="menu" style="display:none"></div>
  <audio id="player"></audio>
  <script src="renderer.js"></script>
</body>
</html>
